name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-0123456789abcdef
      DATABASE_URL: sqlite://
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install .[dev,ml,infra]
      - run: ruff check .
      - run: black --check .
      - run: pytest
