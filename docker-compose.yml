services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/job_coach
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - qdrant
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A job_coach.app.core.celery_app worker -l info
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/job_coach
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_coach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"

volumes:
  pgdata: